<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="grid">
        <h1>Sign Up</h1>
        <form method="post"> 
            <div id="row">
                <input type="text" class="input" placeholder="First Name">
                <input type="text" class="input" placeholder="Last Name">
            </div>
                <input type="tel" class="input" placeholder="Mobile No.">
                <input type="email" class="input" placeholder="Email Address">
            <div id="row">
                <input type="password" class="input" placeholder="Password">
                <input type="password" class="input" placeholder="Confirm Password">
            </div>
            <div id="agree-row">
                <label id="agree-label">
                <input type="checkbox" id="accept" name="accept">I Agree
                </label>
                <p id="terms-text">By clicking <span id="register-badge">Register</span>, you agree to the <a href="#">Terms and Conditions</a> set out by this site, including our Cookie Use.</p>
            </div>
            <div id="button-row">
                <button type="submit" class="btn btn-register">Register</button>
                <button type="button" class="btn btn-signin">Sign In</button>
            </div>
        </form>
    </div>
<footer>
    <p>Antra Inc. 21355 Ridgetop Circle Suite 300 Dulels VA 20166</p>
    <p>Phone: 703.994.4545 Fax: 703.373.2975 e-mail:hr@antra.net website: www.antra.net</p>
</footer>
</body>
</html>
